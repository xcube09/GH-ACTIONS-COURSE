name: 04 - Using Actions

on: push


jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                node-version: '24.x'

            - name: Install dependencies
              run: npm ci
              working-directory: ./04-using-actions/react-app